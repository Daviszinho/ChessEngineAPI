name: Security Scan (OWASP ZAP)

# on:
#   push:
#     branches: [ main, develop ]
#   pull_request:
#     branches: [ main, develop ]
#   schedule:
#     # Run security scan daily at 2 AM UTC
#     - cron: '0 2 * * *'

jobs:
  security-scan:
    runs-on: ubuntu-latest
    name: OWASP ZAP Security Scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t chess-engine-api:test .

      - name: Start services
        run: docker-compose up -d

      - name: Wait for API to be healthy
        run: |
          for i in {1..60}; do
            if curl -s http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "✓ API is healthy"
              exit 0
            fi
            echo "Waiting for API... ($i/60)"
            sleep 2
          done
          echo "✗ API did not become healthy"
          exit 1

      - name: Wait for ZAP to be ready
        run: |
          for i in {1..60}; do
            if curl -s http://localhost:8080/api/ascan/status?apikey=test > /dev/null 2>&1; then
              echo "✓ ZAP is ready"
              exit 0
            fi
            echo "Waiting for ZAP... ($i/60)"
            sleep 2
          done
          echo "✗ ZAP did not become ready"
          exit 1

      - name: Run OWASP ZAP Baseline Scan
        run: |
          docker-compose exec -T owasp-zap zap-baseline.py \
            -t http://chess-engine-api:3000 \
            -r /zap/reports/report_baseline.html \
            -J /zap/reports/report_baseline.json \
            -a 2>&1 || true

      - name: Verify Vulnerabilities
        run: |
          node ./security/verify-vulnerabilities.js ./security/zap-reports/report_baseline.json

      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-security-report
          path: security/zap-reports/
          retention-days: 30

      - name: Comment on PR with Results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const reportPath = './security/zap-reports/report_baseline.json';
            
            let comment = '## 🔒 Security Scan Results\n\n';
            
            if (fs.existsSync(reportPath)) {
              const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
              let totalAlerts = 0;
              
              if (report.site && Array.isArray(report.site)) {
                report.site.forEach(site => {
                  if (site.alerts) totalAlerts += site.alerts.length;
                });
              }
              
              comment += `Total Alerts Detected: **${totalAlerts}**\n`;
              comment += `\n**View full report in Artifacts tab**`;
            } else {
              comment += 'Failed to generate report';
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Stop services
        if: always()
        run: docker-compose down

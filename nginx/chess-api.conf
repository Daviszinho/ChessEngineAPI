server {
    listen 8080;
    listen [::]:8080;
    
    server_name localhost daviszinhovm.westus2.cloudapp.azure.com;
    
    # Explicitly disable HTTPS redirect
    location /.well-known/acme-challenge/ {
        return 200;
    }
    
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
    
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

server {
    listen 8443 ssl;
    listen [::]:8443 ssl;
    
    server_name localhost daviszinhovm.westus2.cloudapp.azure.com;
    
    # SSL configuration
    ssl_certificate /home/daviszinho/ChessEngineAPI/nginx/ssl/cert.pem;
    ssl_certificate_key /home/daviszinho/ChessEngineAPI/nginx/ssl/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    
    location /api/ {

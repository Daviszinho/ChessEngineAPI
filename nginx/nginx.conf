user www-data;
worker_processes auto;
pid /home/daviszinho/ChessEngineAPI/nginx/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 768;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Custom log paths
    access_log /home/daviszinho/ChessEngineAPI/nginx/access.log;
    error_log /home/daviszinho/ChessEngineAPI/nginx/error.log;

    # Disable sites-enabled include
    # include /etc/nginx/conf.d/*.conf;
    # include /etc/nginx/sites-enabled/*;

    include /home/daviszinho/ChessEngineAPI/nginx/chess-api.conf;
}